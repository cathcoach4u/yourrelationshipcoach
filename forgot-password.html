<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Relationship Coach — Forgot Password</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <div style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:420px;padding:20px;">

    <div class="login-card">
      <div class="login-logo">
        <h1>Your Relationship Coach</h1>
      </div>
      <p class="login-title">Reset your password</p>
      <p class="login-subtitle">Enter your email and we'll send you a reset link.</p>

      <form id="forgotForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
        </div>

        <div id="message" class="login-message"></div>

        <button type="submit" class="login-btn" id="submitBtn">Send Reset Link</button>
      </form>

      <a href="login.html" class="login-forgot">Back to sign in</a>
    </div>

    <p style="margin-top:20px;font-size:9pt;color:rgba(255,255,255,0.75);text-align:center;line-height:1.6;">
      Strengths-Based Coaching and Counselling<br>
      <a href="http://www.coach4u.com.au" style="color:rgba(255,255,255,0.75);">www.coach4u.com.au</a> |
      <a href="mailto:cath@coach4u.com.au" style="color:rgba(255,255,255,0.75);">cath@coach4u.com.au</a> |
      0402 313 337
    </p>

  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL      = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form  = document.getElementById('forgotForm');
    const msgEl = document.getElementById('message');
    const btn   = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Sending…';
      msgEl.style.display = 'none';
      msgEl.className = 'login-message';

      const email = document.getElementById('email').value.trim();

      const redirectTo = window.location.href.replace('forgot-password.html', 'reset-password.html');

      const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });

      msgEl.style.display = 'block';
      if (error) {
        msgEl.classList.add('error');
        msgEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      } else {
        msgEl.classList.add('success');
        msgEl.textContent = 'Check your email for a reset link.';
      }
    });
  </script>

</body>
</html>
