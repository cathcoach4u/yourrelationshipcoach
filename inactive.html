<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Relationship Coach — Membership Inactive</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    }
    .inactive-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      text-align: center;
    }
    .inactive-card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
    }
    .inactive-card p {
      font-size: 1rem;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .inactive-card p:last-of-type { margin-bottom: 32px; }
    footer {
      margin-top: 32px;
      font-size: 9pt;
      color: rgba(255,255,255,0.75);
      text-align: center;
      line-height: 1.6;
    }
    footer a { color: rgba(255,255,255,0.75); }
  </style>
</head>
<body>

  <div class="inactive-card">
    <h1>Membership not active</h1>
    <p>Your account exists but your membership is not active yet.</p>
    <p>If you have recently signed up, please contact Cath to get access.</p>
    <button class="btn btn-navy" id="signOutBtn">Sign out</button>
  </div>

  <footer>
    Strengths-Based Coaching and Counselling<br>
    <a href="http://www.coach4u.com.au">www.coach4u.com.au</a> |
    <a href="mailto:cath@coach4u.com.au">cath@coach4u.com.au</a> |
    0402 313 337
  </footer>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL      = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('signOutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    });
  </script>

</body>
</html>
