<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Relationship Coach</title>
</head>
<body>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL      = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = 'login.html';
    } else {
      const { data: profile } = await supabase.from('users')
        .select('membership_status').eq('id', session.user.id).single();
      if (profile?.membership_status === 'active') {
        window.location.href = 'portal.html';
      } else {
        window.location.href = 'inactive.html';
      }
    }
  </script>
</body>
</html>
